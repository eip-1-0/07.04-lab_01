name: Renovate

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6,18 * * *"

permissions:
  contents: read

jobs:
  renovate:
    name: Run Renovate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Renovate
        uses: renovatebot/github-action@v44.0.1
        with:
          token: ${{ secrets.RENOVATE_TOKEN }}
