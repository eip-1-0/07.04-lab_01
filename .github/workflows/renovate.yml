name: Renovate

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6,18 * * *"

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  renovate:
    name: Run Renovate
    runs-on: ubuntu-latest
    env:
      RENOVATE_TOKEN: ${{ secrets.RENOVATE_TOKEN != '' && secrets.RENOVATE_TOKEN || secrets.GITHUB_TOKEN }}

    steps:
      - name: Check token mode
        run: |
          if [ -n "${{ secrets.RENOVATE_TOKEN }}" ]; then
            echo "Using RENOVATE_TOKEN."
          else
            echo "RENOVATE_TOKEN is not set, falling back to GITHUB_TOKEN."
            echo "Dockerfile updates should still work, but updates in .github/workflows may require a PAT with workflow access."
          fi

      - name: Run Renovate
        uses: renovatebot/github-action@v44.0.1
        with:
          configurationFile: renovate.json
          token: ${{ env.RENOVATE_TOKEN }}
